name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
      - name: Pin npm
        run: npm install --global npm@12
      - name: Install dependencies
        run: npm ci
      - name: Check formatting
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Type-check Node project
        run: npm run typecheck
      - name: Type-check browser project
        run: npm run typecheck:browser
      - name: Test
        run: npm test -- --test-randomize --test-random-seed=20260713
      - name: Build
        run: npm run build
