name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun ci --frozen-lockfile --omit peer
      - name: Check formatting
        run: bun run format:check
      - name: Lint
        run: bun run lint
      - name: Type-check Bun project
        run: bun run typecheck
      - name: Type-check browser project
        run: bun run typecheck:browser
      - name: Test
        run: bun test --seed 20260713
      - name: Build
        run: bun run build

  rust-linux:
    name: Rust Linux x64 glibc 2.35
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install pinned Rust toolchain and target libraries
        run: |
          rustup toolchain install 1.88.0 --profile minimal --component rustfmt --component clippy
          rustup target add --toolchain 1.88.0 x86_64-pc-windows-msvc x86_64-apple-darwin aarch64-unknown-linux-gnu riscv64gc-unknown-linux-gnu
      - name: Verify Ubuntu 22.04 glibc floor
        run: ldd --version | head -n 1 | grep -F '2.35'
      - name: Format, lint, test, and verify target isolation
        run: |
          cargo +1.88.0 fmt --all -- --check
          cargo +1.88.0 clippy --workspace --all-targets --locked -- -D warnings
          cargo +1.88.0 test --workspace --locked
          scripts/verify-rust-target-isolation.sh

  rust-windows:
    name: Rust Windows x64
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.88.0-x86_64-pc-windows-msvc --profile minimal
      - name: Build workspace
        run: cargo +1.88.0 build --workspace --locked
      - name: Smoke test CLI
        shell: pwsh
        run: |
          $configPath = Join-Path $env:RUNNER_TEMP 'phrasic-v1.toml'
          [System.IO.File]::WriteAllText($configPath, "schema_version = 1`nport = 8080`n")
          & .\target\debug\phrasic.exe serve $configPath
          if ($LASTEXITCODE -ne 0) {
            throw "phrasic CLI smoke test failed with exit code $LASTEXITCODE"
          }

  grpc-native-ipc-linux:
    name: gRPC native IPC spike (Linux UDS)
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.88.0 --profile minimal --component rustfmt --component clippy
      - name: Install locked spike dependencies
        working-directory: spikes/grpc-native-ipc
        run: bun ci --frozen-lockfile
      - name: Build before native smoke
        working-directory: spikes/grpc-native-ipc
        run: |
          cargo +1.88.0 build --workspace --locked
          bun run typecheck
          bun run build
      - name: Check Rust and run Linux UDS interoperability
        working-directory: spikes/grpc-native-ipc
        env:
          CHROME_BIN: /usr/bin/google-chrome
        run: |
          cargo +1.88.0 fmt --all -- --check
          cargo +1.88.0 clippy --workspace --all-targets --locked -- -D warnings
          cargo +1.88.0 test --workspace --locked
          test -z "$(find dist -type f -name '*.map' -print -quit)"
          bun test --seed 20260718 ./test/deadline-status.probe.ts ./test/interoperability.probe.ts

  grpc-native-ipc-windows:
    name: gRPC native IPC spike (Windows named pipe)
    runs-on: windows-2025
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.88.0-x86_64-pc-windows-msvc --profile minimal --component rustfmt --component clippy
      - name: Install locked spike dependencies
        working-directory: spikes/grpc-native-ipc
        run: bun ci --frozen-lockfile
      - name: Build before native smoke
        working-directory: spikes/grpc-native-ipc
        run: |
          cargo +1.88.0 build --workspace --locked
          bun run typecheck
          bun run build
      - name: Check Rust and run Windows named-pipe interoperability
        working-directory: spikes/grpc-native-ipc
        shell: pwsh
        run: |
          cargo +1.88.0 fmt --all -- --check
          cargo +1.88.0 clippy --workspace --all-targets --locked -- -D warnings
          cargo +1.88.0 test --workspace --locked
          if (Get-ChildItem -Path dist -Recurse -Filter '*.map') {
            throw 'Source maps were emitted by the spike build'
          }
          $env:CHROME_BIN = 'C:\Program Files\Google\Chrome\Application\chrome.exe'
          bun test --seed 20260718 ./test/deadline-status.probe.ts ./test/interoperability.probe.ts

  publish-image:
    name: Publish Docker image
    if: startsWith(github.ref, 'refs/tags/v')
    needs: quality
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: metadata
        with:
          images: alsilawr/phrasic
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
